<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · GlaciaNav Notes</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f8fc;
        color: #14161c;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .card {
        max-width: 340px;
        padding: 40px 28px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 14px 40px -12px rgba(30, 42, 90, 0.18);
        backdrop-filter: blur(20px);
      }
      .bars { display: inline-flex; align-items: center; gap: 4px; height: 48px; margin-bottom: 20px; }
      .bars span {
        width: 5px; border-radius: 3px;
        background: linear-gradient(180deg, #0ea5e9, #8b5cf6);
      }
      h1 { font-size: 19px; margin: 0 0 8px; letter-spacing: -0.02em; }
      p { font-size: 14px; line-height: 1.5; color: #565d6e; margin: 0 0 22px; }
      button {
        height: 44px; padding: 0 22px; border: none; cursor: pointer;
        border-radius: 12px; background: #14161c; color: #fff;
        font-size: 14px; font-weight: 500;
        transition: transform 160ms cubic-bezier(0.23, 1, 0.32, 1);
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="bars" aria-hidden="true">
        <span style="height: 40%"></span>
        <span style="height: 72%"></span>
        <span style="height: 100%"></span>
        <span style="height: 58%"></span>
        <span style="height: 84%"></span>
        <span style="height: 44%"></span>
      </div>
      <h1>You're offline</h1>
      <p>GlaciaNav Notes needs a connection to load your captures. Check your network and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
